name: medical-ai-env
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - numpy>=1.26.0,<2.3
  - scipy>=1.13.0
  - scikit-learn>=1.4.2
  - pandas>=2.2.2
  - lightgbm=4.3.0
  - joblib=1.4.2
  - pillow=12.2.0
  - matplotlib=3.10.9
  - watchdog=6.0.0
  - pip:
      - streamlit==1.57.0
      - st-supabase-connection==2.1.3
      - supabase==2.30.0
      - opencv-python-headless==4.13.0.92
      - torch==2.6.0+cpu --find-links https://download.pytorch.org/whl/cpu
      - torchvision==0.21.0+cpu --find-links https://download.pytorch.org/whl/cpu